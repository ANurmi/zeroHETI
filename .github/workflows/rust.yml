name: Rust regression tests

# Triggers when there is any activity on a pull request, e.g. opened, updated.
on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    branches:
      - "*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Bender
        run: |
          curl -L https://github.com/pulp-platform/bender/releases/download/v0.29.1/bender-0.29.1-x86_64-linux-gnu-ubuntu24.04.tar.gz | tar xz -C .
          echo $GITHUB_WORKSPACE >> $GITHUB_PATH

      - name: Fetch dependencies
        run: bender update && bender vendor init

      - name: Install Verilator
        run: sudo apt install verilator=5.020-1

      - name: Build
        run: |
          cd examples/zeroheti-bsp
          cargo check -Frtl-tb -Fintc-hetic --lib --examples
          cargo check -Frtl-tb -Fintc-clic --lib --examples
          cargo check -Frtl-tb -Fintc-edfic --lib --examples

      - name: Test Hello
        run: |
          make verilate
          cd examples/zeroheti-bsp
          cargo run --release -Frtl-tb -Fintc-clic --example all_irqs

      - name: Test all IRQs (CLIC)
        run: |
          make verilate INTC=CLIC
          cd examples/zeroheti-bsp
          cargo run --release -Frtl-tb -Fintc-clic --example all_irqs

      - name: Test all IRQs (HETIC)
        run: |
          make verilate INTC=HETIC
          cd examples/zeroheti-bsp
          cargo run --release -Frtl-tb -Fintc-hetic --example all_irqs

      - name: Test all IRQs (EDFIC)
        run: |
          make verilate INTC=EDFIC
          cd examples/zeroheti-bsp
          cargo run --release -Frtl-tb -Fintc-edfic --example all_irqs
